production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  refresh_tokens:
    class: RefreshTokensJob
    queue: maintenance
    schedule: at 3am every day

  sync_assignments:
    command: "User.find_each { |u| SyncBasecampAssignmentsJob.perform_later(u.id) }"
    queue: sync
    schedule: every 15 minutes

  sync_hey:
    command: "User.where.not(hey_access_token: nil).find_each { |u| SyncHeyCalendarJob.perform_later(u.id) }"
    queue: sync
    schedule: every 15 minutes

  sync_hey_emails:
    command: "User.where.not(hey_access_token: nil).find_each { |u| SyncHeyEmailsJob.perform_later(u.id) }"
    queue: sync
    schedule: at 6am every day

  sync_calendar_events:
    command: "User.find_each { |u| SyncCalendarEventsJob.perform_later(u.id) if u.basecamp_access_token.present? || u.hey_access_token.present? }"
    queue: sync
    schedule: every 15 minutes
